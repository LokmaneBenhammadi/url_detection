<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Detection Demo</title>
  <style>
    :root {
      --bg0: #0f172a;
      --bg1: #111827;
      --card: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --bad: #ef4444;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 500px at 20% -10%, #1d4ed8 0%, transparent 60%),
                  radial-gradient(1000px 500px at 100% 0%, #0ea5e9 0%, transparent 55%),
                  linear-gradient(160deg, var(--bg0), var(--bg1));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(920px, 100%);
      background: color-mix(in srgb, var(--card) 92%, black 8%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    .hero {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: 0.2px;
    }
    .status { color: var(--muted); font-size: 0.95rem; }
    .content { padding: 24px; }
    label { display: block; margin-bottom: 8px; color: var(--muted); }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      color: #0b1220;
      background: var(--accent);
    }
    button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1220;
      min-height: 64px;
      white-space: pre-wrap;
    }
    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .badge.ok { background: rgba(34, 197, 94, 0.2); color: #86efac; }
    .badge.bad { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Malicious URL Detection Demo</h1>
      <div class="status" id="healthText">Checking backend...</div>
    </div>
    <div class="content">
      <label for="urlInput">Enter a URL to classify</label>
      <input id="urlInput" type="text" placeholder="http://example.com/login?id=42" />
      <div class="row">
        <button id="predictBtn">Predict</button>
        <button id="sampleBtn" class="secondary">Use Sample</button>
      </div>
      <div class="result" id="resultBox">Result will appear here.</div>
    </div>
  </div>

  <script>
    const healthText = document.getElementById('healthText');
    const urlInput = document.getElementById('urlInput');
    const resultBox = document.getElementById('resultBox');
    const predictBtn = document.getElementById('predictBtn');
    const sampleBtn = document.getElementById('sampleBtn');

    async function checkHealth() {
      try {
        const r = await fetch('/health');
        const data = await r.json();
        if (data.model_loaded) {
          healthText.textContent = `Backend ready | model: ${data.model_name} | features: ${data.n_features}`;
        } else {
          healthText.textContent = 'Backend up, but model is not loaded.';
        }
      } catch {
        healthText.textContent = 'Backend unreachable.';
      }
    }

    async function predict() {
      const url = urlInput.value.trim();
      if (!url) {
        resultBox.textContent = 'Please enter a URL first.';
        return;
      }
      resultBox.textContent = 'Running prediction...';

      try {
        const r = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await r.json();
        if (!r.ok) {
          resultBox.textContent = `Error ${r.status}: ${data.detail || 'Unknown error'}`;
          return;
        }

        const cls = data.label === 'malicious' ? 'bad' : 'ok';
        const badgeText = data.label.toUpperCase();
        resultBox.innerHTML =
          `URL: ${data.url}\n` +
          `Prediction: ${data.label} <span class="badge ${cls}">${badgeText}</span>\n` +
          `Probability: ${(data.probability * 100).toFixed(2)}%\n` +
          `Model: ${data.model_name}\n` +
          `Features used: ${data.features_used}`;
      } catch (e) {
        resultBox.textContent = `Request failed: ${e}`;
      }
    }

    predictBtn.addEventListener('click', predict);
    sampleBtn.addEventListener('click', () => {
      urlInput.value = 'http://example.com/login?id=42';
    });

    checkHealth();
  </script>
</body>
</html>
